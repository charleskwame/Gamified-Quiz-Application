name: CD - Release to GitHub

on:
  push:
    branches: [main]

jobs:
  build-and-release:
    name: Build Signed APK & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Decode signing secrets
        run: |
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > android/key.properties
          sed -i 's|^storeFile=.*|storeFile=upload-keystore.jks|' android/key.properties
          sed -i 's|^storeType=.*|storeType=jks|' android/key.properties
          if ! grep -q '^storeType=' android/key.properties; then echo 'storeType=jks' >> android/key.properties; fi
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/upload-keystore.p12
          echo "${{ secrets.GOOGLE_SERVICES }}" | base64 --decode > android/app/google-services.json
          STORE_PASSWORD=$(grep '^storePassword=' android/key.properties | cut -d'=' -f2-)
          KEY_PASSWORD=$(grep '^keyPassword=' android/key.properties | cut -d'=' -f2-)
          keytool -importkeystore -srckeystore android/app/upload-keystore.p12 -srcstoretype PKCS12 -destkeystore android/app/upload-keystore.jks -deststoretype JKS -srcstorepass "$STORE_PASSWORD" -deststorepass "$STORE_PASSWORD" -srcalias upload -destalias upload -srckeypass "$KEY_PASSWORD" -destkeypass "$KEY_PASSWORD" -noprompt
          rm android/app/upload-keystore.p12

      - name: 🎯 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Run static analysis
        run: flutter analyze --no-fatal-infos

      - name: 🧪 Run tests
        run: flutter test

      - name: 🏗️ Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: 📝 Generate release tag
        id: tag
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | head -1 | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: 📄 Generate release notes
        id: notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Release ${{ steps.tag.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Changes since last release:" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD 2>/dev/null >> $GITHUB_OUTPUT || echo "- Initial release" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "v${{ steps.tag.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: |
            build/app/outputs/flutter-apk/*release-*.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
