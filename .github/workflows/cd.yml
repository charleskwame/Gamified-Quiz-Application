name: CD - Release to GitHub

on:
  push:
    branches: [main]

jobs:
  build-and-release:
    name: Build Signed APK & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Decode keystore properties
        run: |
          echo "${{ secrets.KEY_STORE }}" | base64 --decode > android/key.properties
          echo "${{ secrets.GOOGLE_SERVICES }}" | base64 --decode > android/app/google-services.json

      - name: 🎯 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Run static analysis
        run: flutter analyze

      - name: 🧪 Run tests
        run: flutter test

      - name: 🏗️ Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 📝 Generate release tag
        id: tag
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | head -1 | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: 📄 Generate release notes
        id: notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Release ${{ steps.tag.outputs.version }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Changes since last release:" >> $GITHUB_OUTPUT
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD 2>/dev/null >> $GITHUB_OUTPUT || echo "- Initial release" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "v${{ steps.tag.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: |
            build/app/outputs/flutter-apk/*release-*.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
